<!DOCTYPE html>

    <style>

        body {
            margin: 0;

            background-color: white;
        }

        header {
            background-color: #2e8b57;
            color: white;
            padding: 25px;
            text-align: center;
        }

        nav {
            background-color: #3cb371;

        }

        .inventory-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }

        .spec-button {
            display: inline-block;
            background-color: #2e8b57;
            color: white;
            padding: 10px 18px;
            margin-top: 12px;
            text-decoration: none;
