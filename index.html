<!DOCTYPE html>
<html>

<head>
    <title>Ruble Sales and Service</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        header {
            background-color: #2e8b57;
            padding: 20px;
            text-align: center;
        }

        .logo {
            max-width: 350px;
            width: 80%;
            height: auto;
        }

        nav {
            background-color: #3cb371;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover {
            color: #d1fae5;
        }

        .hero {
            position: relative;
            text-align: center;
        }

        .hero-image {
            width: 100%;
            height: 650px;
            object-fit: cover;
            object-position: center -750px;
            display: block;
        }

        .hero-text {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: rgba(46, 139, 87, 0.9);
            padding: 20px 0;
        }

        .hero h2 {
            color: white;
            font-size: 36px;
            margin: 0 0 8px 0;
        }

        .hero p {
            font-size: 18px;
            color: white;
            margin: 0 0 12px 0;
        }

        .button {
            display: inline-block;
            background-color: white;
            color: #2e8b57;
            padding: 10px 20px;
            margin: 5px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
        }

        .button:hover {
            background-color: #d1fae5;
        }

        footer {
            background-color: #2e8b57;
            color: white;
            padding: 40px 20px;
            margin-top: 50px;
        }

        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 40px;
            align-items: center;
        }

        .footer-info {
            flex: 1;
            min-width: 250px;
        }

        .footer-info h3 {
            margin-top: 0;
            font-size: 28px;
        }

        .footer-info p {
            font-size: 18px;
            line-height: 1.6;
        }

        .footer-map {
            flex: 1;
            min-width: 300px;
        }

        .footer-map iframe {
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Ruble Sales and Service Logo" class="logo">
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="newinventory.html">New Inventory</a>
        <a href="usedinventory.html">Used Inventory</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="hero">

        <img src="images/sign.jpeg" alt="Ruble Sales and Service Sign" class="hero-image">

        <div class="hero-text">
            <h2>Vermeer Dealer</h2>

            <p>Ruble Sales and Service owned by Brent Ruble.</p>

            <a class="button" href="newinventory.html">View New Inventory</a>
            <a class="button" href="usedinventory.html">View Used Inventory</a>
        </div>

    </section>

    <footer>

        <div class="footer-content">

            <div class="footer-info">

                <h3>Ruble Sales and Service</h3>

                <p>Authorized Vermeer Dealer</p>

                <p>Liberty Center, Iowa</p>

                <p>Call us for equipment availability and pricing.</p>

            </div>

            <div class="footer-map">

                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3001.7670609500196!2d-93.50310742316887!3d41.205051771323795!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87e94b5e54ea5547%3A0x5f5cfa959057cc3f!2sRuble%20Sales%20%26%20Services!5e0!3m2!1sen!2sus!4v1779342555318!5m2!1sen!2sus"
                    width="100%"
                    height="250"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>

            </div>

        </div>

    </footer>

</body>

</html>
