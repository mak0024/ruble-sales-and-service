<!DOCTYPE html>
<html>

<head>
    <title>Ruble Sales and Service</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        header {
            background-color: #2e8b57;
            color: white;
            padding: 25px;
            text-align: center;
        }

        nav {
            background-color: #3cb371;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover {
            color: #d1fae5;
        }

        .hero {
            position: relative;
            text-align: center;
        }

        .hero-image {
            width: 100%;
            height: 650px;
            object-fit: cover;
            object-position: center -750px;
            display: block;
        }

        .hero-text {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: rgba(46, 139, 87, 0.9);
            padding: 20px 0;
        }

        .hero h2 {
            color: white;
            font-size: 36px;
            margin: 0 0 8px 0;
        }

        .hero p {
            font-size: 18px;
            color: white;
            margin: 0 0 12px 0;
        }

        .button {
            display: inline-block;
            background-color: white;
            color: #2e8b57;
            padding: 10px 20px;
            margin: 5px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
        }

        .button:hover {
            background-color: #d1fae5;
        }
    </style>
</head>

<body>

    <header>
        <h1>Ruble Sales and Service</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="newinventory.html">New Inventory</a>
        <a href="usedinventory.html">Used Inventory</a>
        <a href="contact.html">Contact</a>
    </nav>

    <section class="hero">

        <img src="images/sign.jpeg" alt="Ruble Sales and Service Sign" class="hero-image">

        <div class="hero-text">
            <h2>Vermeer Dealer</h2>

            <p>Ruble Sales and Service owned by Brent Ruble.</p>

            <a class="button" href="newinventory.html">View New Inventory</a>
            <a class="button" href="usedinventory.html">View Used Inventory</a>
        </div>

    </section>

</body>

</html>
