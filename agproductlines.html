<!DOCTYPE html>
<html>

<head>
    <title>Ag Product Lines - Ruble Sales and Service</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        header {
            background-color: #2e8b57;
            padding: 15px 30px;
            display: flex;
            align-items: center;
        }

        .logo {
            width: 220px;
            height: auto;
        }

        .header-text {
            color: white;
            margin-left: 25px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 42px;
        }

        nav {
            background-color: #3cb371;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover {
            color: #d1fae5;
        }

        .dropdown {
            display: inline-block;
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #3cb371;
            min-width: 220px;
            z-index: 1;
            border-radius: 0 0 8px 8px;
        }

        .dropdown-content a {
            display: block;
            margin: 0;
            padding: 12px;
            text-align: left;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .content-container {
            padding: 40px;
            text-align: center;
        }

        h2 {
            color: #2e8b57;
            font-size: 40px;
            margin-bottom: 15px;
        }

        .intro-text {
            font-size: 18px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
        }

        .brands-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .brand-card {
            background-color: #f0fff4;
            border: 2px solid #3cb371;
            border-radius: 12px;
            padding: 25px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }

        .brand-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .brand-card img:hover {
            transform: scale(1.05);
        }

        .brand-card h3 {
            color: #2e8b57;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .brand-card p {
            font-size: 17px;
            line-height: 1.6;
        }

        .brand-button {
            display: inline-block;
            margin-top: 15px;
            background-color: #2e8b57;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .brand-button:hover {
            background-color: #3cb371;
        }
    </style>
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Ruble Sales and Service Logo" class="logo">

        <div class="header-text">
            <h1>Ruble Sales and Service, LLC</h1>
        </div>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="newinventory.html">New Inventory</a>
        <a href="usedinventory.html">Used Inventory</a>
        <a href="contact.html">Contact</a>
        <a href="equipmentrequest.html">Equipment Request</a>

        <div class="dropdown">
            <a href="#">More</a>

            <div class="dropdown-content">
                <a href="agproductlines.html">Ag. Product Lines</a>
            </div>
        </div>
    </nav>

    <div class="content-container">

        <h2>Ag Product Lines</h2>

        <p class="intro-text">
            Ruble Sales and Service offers trusted agricultural product lines
            for equipment, replacement parts, and farming needs.
        </p>

        <div class="brands-container">

            <div class="brand-card">

                <a href="https://www.vermeer.com/na" target="_blank">
                    <img src="images/vermeer.webp" alt="Vermeer Logo">
                </a>

                <h3>Vermeer</h3>

            </div>

            <div class="brand-card">

                <a href="https://aiproducts.com" target="_blank">
                    <img src="images/a&i.avif" alt="A&I Logo">
                </a>

                <h3>A&amp;I Products</h3>

            </div>

            <div class="brand-card">

                <a href="https://www.smalink.com/" target="_blank">
                    <img src="images/sma.webp" alt="SMA Logo">
                </a>

                <h3>SMA</h3>

            </div>

        </div>

    </div>

</body>

</html>
